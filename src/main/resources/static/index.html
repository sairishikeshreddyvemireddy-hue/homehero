<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HOME HERO</title>

<style>
    /* Sidebar */

.sidebar{

    height:100%;

    width:0;

    position:fixed;

    top:0;

    left:0;

    background:rgba(15,25,40,.70);

    backdrop-filter:blur(18px);

    -webkit-backdrop-filter:blur(18px);

    border-right:1px solid rgba(255,255,255,.2);

    overflow-x:hidden;
    overflow-y:auto;

    transition:0.4s;

    padding-top:60px;

    z-index:9999;

}

.sidebar a{

    display:block;

    color:white;

    text-decoration:none;

    font-size:24px;

    padding:18px 30px;

    transition:.3s;

}

.sidebar a:hover{

    background:rgba(255,255,255,.15);

    padding-left:45px;

    border-left:5px solid cyan;

    transition:.3s;

}
/* Account Dropdown */

.account-menu{
    display:none;
    background:rgba(255,255,255,0.08);
    margin:0 15px 10px 15px;
    border-radius:10px;
    overflow:hidden;
}

.account-menu a{
    font-size:18px;
    padding:14px 20px;
    border-left:none;
}

.account-menu a:hover{
    background:rgba(255,255,255,0.15);
    padding-left:30px;
}



.close-btn{

    position:absolute;

    top:10px;

    right:20px;

    font-size:40px;

    color:white;

    background:none;

    border:none;

    cursor:pointer;

}
.profile{

    text-align:center;

    color:white;

    margin-bottom:20px;

}

.profile img{

    width:90px;

    height:90px;

    border-radius:50%;

    border:4px solid white;

    box-shadow:0px 0px 20px rgba(255,255,255,.5);

}

.profile h2{

    margin-top:15px;

    background:none;

    backdrop-filter:none;

    text-shadow:none;

    font-size:22px;

}

.profile p{

    color:#ddd;

    font-size:15px;

}

.sidebar hr{

    border:1px solid rgba(255,255,255,.2);

    margin:20px;

}

body{
    font-family: Arial, sans-serif;
    margin:2px;
    padding:2px;
    min-height:100vh;
}

/* Heading */

h1{
    color:white;
    text-align:center;
    font-size:40px;
    padding:15px;
    border-radius:15px;

    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(10px);
    text-shadow:2px 2px 10px black;
}

h2{
    color:white;
    font-size:24px;
    padding:10px 20px;
    width:fit-content;
    margin:20px auto;
    border-radius:10px;

    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(10px);
    text-shadow:2px 2px 8px black;
}

/* Menu */

.menu-btn{
    position:fixed;
    top:20px;
    left:20px;
    font-size:22px;
    cursor:pointer;
    border:none;
    padding:10px 15px;
    border-radius:8px;
}

.menu-btn:hover{
    background:#7054eb;
    color:white;
}

/* Account */

.acc-btn{
    position:fixed;
    top:20px;
    right:20px;
    font-size:22px;
    cursor:pointer;
    border:none;
    padding:10px 15px;
    border-radius:8px;
}

.acc-btn:hover{
    background:#9c2626;
}

/* Buttons */

.buttons{
    text-align:center;
}

.btn-1{

    position:absolute;
    top:350px;
    left:400px;

    padding:20px 45px;

    font-size:24px;

    text-decoration:none;

    background:#007BFF;
    color:white;

    border-radius:12px;

    transition:.3s;

    box-shadow:0px 8px 20px rgba(0,0,0,.4);

}

.btn-1:hover{

    background:#0056b3;

    transform:scale(1.05);

}

.btn-2{

    position:absolute;
    top:350px;
    right:300px;

    padding:20px 45px;

    font-size:24px;

    text-decoration:none;

    background:#007BFF;
    color:white;

    border-radius:12px;

    transition:.3s;

    box-shadow:0px 8px 20px rgba(0,0,0,.4);

}

.btn-2:hover{

    background:#0056b3;

    transform:scale(1.05);

}



</style>

</head>

<body id="vanta-bg">
    <!-- Sidebar -->
<div id="sidebar" class="sidebar">

    <button class="close-btn" onclick="closeMenu()">&times;</button>

    <div class="profile">

        <img src="https://i.pravatar.cc/120" alt="Profile">

        <h2>Welcome!</h2>

        <p>HomeHero User</p>

    </div>

    <hr>

    <a href="index.html">🏠 Home</a>
    <a href="about.html">ℹ About Us</a>
    <a href="contact.html">📞 Contact</a>
    <a href="#" onclick="toggleAccountMenu()">👤 Account ▼</a>

<div id="accountMenu" class="account-menu">
    <a href="customer-login.html">👤 Customer Login</a>
    <a href="professional-login.html">👷 Professional Login</a>
    <a href="admin-login.html">🛠 Admin Login</a>
</div>

    <hr>

    <a href="#">⚙ Settings</a>
    <a href="#">🚪 Logout</a>

</div>

<h1>HOME HERO : We Work For Your Home</h1>

<h2>CHOOSE THE WORK YOU ARE LOOKING FOR</h2>

<button class="menu-btn" onclick="openMenu()">&#9776;</button>

<button class="acc-btn">&#128100;</button>

<div class="buttons">

<a href="services.html" class="btn-1">Services</a>

<a href="booking.html" class="btn-2">Book Now</a>

</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>

<script>
    function openMenu(){
    document.getElementById("sidebar").style.width = "280px";
}

function closeMenu(){
    document.getElementById("sidebar").style.width = "0";
}
function toggleAccountMenu() {

    var menu = document.getElementById("accountMenu");

    if (menu.style.display === "block") {
        menu.style.display = "none";
    } else {
        menu.style.display = "block";
    }

}

VANTA.FOG({
  el: "#vanta-bg",
  mouseControls: true,
  touchControls: true,
  gyroControls: false,

  highlightColor: 0xffffff,
  midtoneColor: 0x6ba8d6,
  lowlightColor: 0x2c5f7c,
  baseColor: 0x1e3a5f,

  blurFactor: 0.6,
  speed: 1.0,
  zoom: 1.2
});
</script>

</body>
</html>
