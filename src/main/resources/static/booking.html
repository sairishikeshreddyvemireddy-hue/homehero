<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(-45deg,#2563eb,#3b82f6,#6366f1,#8b5cf6);

background-size:400% 400%;

animation:bgMove 12s ease infinite;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:30px;

}

@keyframes bgMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.container{

width:700px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

padding:35px;

border-radius:20px;

color:white;

box-shadow:0 15px 35px rgba(0,0,0,.35);

}

h1{

text-align:center;

margin-bottom:10px;

font-size:34px;

}

h2{

text-align:center;

font-weight:400;

margin-bottom:30px;

color:#dbeafe;

}

.section{

margin-bottom:25px;

}

.section h3{

margin-bottom:12px;

font-size:20px;

color:#ffffff;

}

</style>

</head>
