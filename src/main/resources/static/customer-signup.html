<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer Sign Up | HomeHero AI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

    background:#111;

    overflow-y:auto;

    padding:20px;

}

.signup-box{

    width:400px;

    padding:25px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border-radius:20px;

    box-shadow:0 8px 35px rgba(0,0,0,.4);

    color:white;

    z-index:2;

}

.signup-box h1{

    text-align:center;

    margin-bottom:8px;

    font-size:28px;

}

.signup-box h3{

    text-align:center;

    margin-bottom:18px;

    font-size:18px;

    font-weight:normal;

}

.input-group{

    margin-bottom:12px;

}

.input-group label{

    display:block;

    margin-bottom:6px;

    font-size:14px;

}

.input-group input{

    width:100%;

    padding:10px;

    border:none;

    outline:none;

    border-radius:10px;

    font-size:15px;

}

.signup-btn{

    width:100%;

    padding:12px;

    border:none;

    border-radius:10px;

    background:#007BFF;

    color:white;

    font-size:16px;

    cursor:pointer;

    transition:.3s;

}

.signup-btn:hover{

    background:#0056b3;

}

.login-link{

    text-align:center;

    margin-top:18px;

    font-size:14px;

}

.login-link a{

    color:#7fdcff;

    text-decoration:none;

}

.login-link a:hover{

    text-decoration:underline;

}

.home-btn{

    display:block;

    text-align:center;

    margin-top:15px;

    padding:10px;

    border:1px solid white;

    border-radius:10px;

    text-decoration:none;

    color:white;

    font-size:15px;

    transition:.3s;

}

.home-btn:hover{

    background:white;

    color:black;

}

</style>

</head>

<body id="vanta-bg">

<div class="signup-box">

<h1>🏠 HomeHero AI</h1>

<h3>Create Customer Account</h3>

<form id="loginForm">

<div class="input-group">
<label>Full Name</label>
<input type="text" placeholder="Enter your full name" required>
</div>

<div class="input-group">
<label>Email Address</label>
<input type="email" placeholder="Enter your email" required>
</div>

<div class="input-group">
<label>Mobile Number</label>
<input type="tel" placeholder="Enter your mobile number" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" placeholder="Create password" required>
</div>

<div class="input-group">
<label>Confirm Password</label>
<input type="password" placeholder="Confirm password" required>
</div>

<button type="submit" class="signup-btn">
Create Account
</button>

</form>

<div class="login-link">

Already have an account?

<a href="customer-login.html">Login</a>

</div>

<a href="index.html" class="home-btn">

⬅ Back to Home

</a>

</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<!-- Vanta -->
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>

<script>

VANTA.FOG({

el:"#vanta-bg",

mouseControls:true,

touchControls:true,

gyroControls:false,

highlightColor:0xffffff,

midtoneColor:0x6ba8d6,

lowlightColor:0x2c5f7c,

baseColor:0x1e3a5f,

blurFactor:0.6,

speed:1.0,

zoom:1.2

});

</script>
<script>
document.getElementById("loginForm").addEventListener("submit", function(event) {

    event.preventDefault();

    // Later we'll validate the user here

    window.location.href = "customer-dashboard.html";

});
</script>

</body>

</html>
